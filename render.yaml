services:
  - type: worker
    name: signal-engine
    env: docker
    plan: free
    envVars:
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_API_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TRADING_PAIRS
        value: BTCUSDT,ETHUSDT,BNBUSDT,SOLUSDT,XRPUSDT,ADAUSDT,DOGEUSDT,MATICUSDT,DOTUSDT,AVAXUSDT,LINKUSDT,LTCUSDT,ATOMUSDT,UNIUSDT,NEARUSDT
      - key: MIN_CONFIDENCE_SCORE
        value: 60
      - key: SCAN_INTERVAL_SECONDS
        value: 600
      - key: LOG_LEVEL
        value: INFO
